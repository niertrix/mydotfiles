font_size 14
cursor_trail 1
cursor_shape block
curosr_shape_unfocused hollow
shell_integration no-cursor
cursor_trail_decay 0.1 0.4
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
# font_family      family="Terminess Nerd Font Mono"
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

progress_bar bottom

window_border_width 1px

tab_bar_style powerline
enabled_layouts *
window_padding_width 5
single_window_padding_width 5
# BEGIN_KITTY_THEME
# Gruvbox Dark
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family="Terminess Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS